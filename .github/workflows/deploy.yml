name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Optimize logo
        run: npm install sharp --no-save && node scripts/optimize-logo.mjs

      - name: Build
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
          VITE_PUBLIC_SUPABASE_URL: https://hbdoyotahgpfjecdhwio.supabase.co
          VITE_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhiZG95b3RhaGdwZmplY2Rod2lvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwODg2MDksImV4cCI6MjA5NzY2NDYwOX0.XAkULirvPB3y5zsXRLtf4IaTNt12og4MirgZ4jsaHHk

      - name: SPA fallback (GitHub Pages)
        run: node scripts/spa-fallback.mjs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
